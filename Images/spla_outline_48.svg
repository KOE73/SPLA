<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none">
  <title>SPLA outline mascot</title>
  <desc>Compact contour-first SVG icon for a local agent desktop app.</desc>

  <defs>
    <style>
      .outer { stroke:#F8FAFC; stroke-width:4.2; stroke-linecap:round; stroke-linejoin:round; }
      .line  { stroke:#111827; stroke-width:2.1; stroke-linecap:round; stroke-linejoin:round; }
      .thin  { stroke:#111827; stroke-width:1.55; stroke-linecap:round; stroke-linejoin:round; }
      .screen-line { stroke:#CFFAFE; stroke-width:2.1; stroke-linecap:round; stroke-linejoin:round; }
    </style>
  </defs>

  <!-- White halo: keeps the silhouette readable on dark backgrounds -->
  <g class="outer" fill="#F8FAFC">
    <path d="M17 9.5c1.6-2.2 4-3.4 7-3.4s5.4 1.2 7 3.4l1.8 4.2H15.2L17 9.5Z"/>
    <path d="M21.6 6.2 17.2 3.7M26.4 6.2l4.4-2.5M17.2 3.7l-4.8.2M30.8 3.7l4.8.2"/>
    <path d="M14 13.2h20a4 4 0 0 1 4 4v10.4a4 4 0 0 1-4 4H14a4 4 0 0 1-4-4V17.2a4 4 0 0 1 4-4Z"/>
    <path d="M16 31.5h16l2.2 9.6H13.8l2.2-9.6Z"/>
    <path d="M13.8 34.3 9.7 36.4M34.2 34.3l4.1 2.1"/>
    <path d="M9.7 36.4 7.4 35.1 5.9 37.5l1.5 1.2 1.8-.2.5-2.1Z"/>
    <path d="M18 41.1v3.1M30 41.1v3.1M15.2 44.2h5.6M27.2 44.2h5.6"/>
  </g>

  <!-- Main art -->
  <g class="line">
    <!-- propeller -->
    <path d="M21.6 6.2 17.2 3.7M26.4 6.2l4.4-2.5M17.2 3.7l-4.8.2M30.8 3.7l4.8.2" stroke="#0F3B78"/>
    <circle cx="24" cy="6.2" r="1.8" fill="#2563EB"/>

    <!-- cap worn on head -->
    <path d="M17 9.5c1.6-2.2 4-3.4 7-3.4s5.4 1.2 7 3.4l1.8 4.2H15.2L17 9.5Z" fill="#FBBF24"/>
    <path d="M17 9.5c1.3-1.8 2.8-2.8 4.6-3.2v7.4h-6.4L17 9.5Z" fill="#EF4444" stroke="none"/>
    <path d="M31 9.5c-1.3-1.8-2.8-2.8-4.6-3.2v7.4h6.4L31 9.5Z" fill="#2563EB" stroke="none"/>
    <path d="M14.8 13.7h18.4" stroke="#0F3B78" stroke-width="2.8"/>

    <!-- rounded terminal head -->
    <path d="M14 13.2h20a4 4 0 0 1 4 4v10.4a4 4 0 0 1-4 4H14a4 4 0 0 1-4-4V17.2a4 4 0 0 1 4-4Z" fill="#F5E7C8"/>
    <path d="M14.3 16.1h19.4a1.5 1.5 0 0 1 1.5 1.5v9.6a1.5 1.5 0 0 1-1.5 1.5H14.3a1.5 1.5 0 0 1-1.5-1.5v-9.6a1.5 1.5 0 0 1 1.5-1.5Z" fill="#0F172A"/>

    <!-- terminal face -->
    <path class="screen-line" d="m16.5 20 2.4 2.2-2.4 2.2M20.3 25.1h2.7M26.7 23c.3-1.1 1-1.7 2-1.7s1.7.6 2 1.7"/>
    <circle cx="32.7" cy="22.3" r="1.15" fill="#CFFAFE" stroke="none"/>

    <!-- hoodie body -->
    <path d="M16 31.5h16l2.2 9.6H13.8l2.2-9.6Z" fill="#172554"/>
    <path d="M20.2 34.2 24 36l3.8-1.8M20.2 37.3h7.6" class="thin" stroke="#334155"/>
    <path d="M21.3 32.5v3M26.7 32.5v3" class="thin" stroke="#F5E7C8"/>

    <!-- arms -->
    <path d="M13.8 34.3 9.7 36.4" stroke="#172554" stroke-width="4"/>
    <path d="M34.2 34.3l4.1 2.1" stroke="#172554" stroke-width="4"/>
    <path d="M9.7 36.4 7.4 35.1 5.9 37.5l1.5 1.2 1.8-.2.5-2.1Z" fill="#F5E7C8"/>
    <path d="M38.3 36.4c.5 1.3.2 2.4-.9 3" stroke="#F5E7C8" stroke-width="2.4"/>

    <!-- legs and shoes -->
    <path d="M18 41.1v3.1M30 41.1v3.1" stroke="#172554" stroke-width="4"/>
    <path d="M15.2 44.2h5.6M27.2 44.2h5.6" stroke="#F5E7C8" stroke-width="3.6"/>
  </g>
</svg>
