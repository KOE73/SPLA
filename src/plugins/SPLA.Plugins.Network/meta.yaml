id: network
version: 1.1.0
type: dll
entry_point: SPLA.Plugins.Network.dll
default_prompt: |
  Network diagnostic and utility tools are available.

  Host & interfaces:
    network_get_host_info      — hostname, local addresses, interfaces, gateways, DNS, public egress IP
    network_get_routes     — IP routing table (ipv4/ipv6/both)
    network_get_arp_cache       — read the local ARP cache (IP → MAC mappings)
    network_wake_host      — send WoL magic packet to a MAC address

  Ping & traceroute:
    network_ping_host          — single ICMP ping
    network_ping_host_stats    — multi-ping with min/avg/max RTT, jitter, packet loss
    network_trace_route    — traceroute; set resolve_hops:true to reverse-resolve each hop

  DNS:
    network_resolve_host   — quick A/AAAA resolution
    network_query_dns      — any record type (A, AAAA, CNAME, MX, NS, SOA, SRV, TXT, PTR)
    network_reverse_dns    — bulk reverse DNS (PTR) for a list of IPs
    network_check_dns_propagation — check record propagation across 10 public resolvers
    network_lookup_whois      — WHOIS lookup for domain or IP; follows IANA referral

  HTTP:
    network_http_get       — HTTP GET (status, headers, truncated body)
    network_http_head      — HTTP HEAD (status and headers only)
    network_http_post      — HTTP POST with optional body
    network_check_http_redirects — follow redirect chain step-by-step

  TLS / SSL:
    network_check_tls      — full TLS diagnostics: protocol, cipher, cert chain, key, extensions, OS validation

  SMTP:
    network_probe_smtp     — EHLO handshake: banner, STARTTLS, AUTH methods, size limit, extensions

  LAN & port scanning:
    network_discover_hosts       — discover hosts in an IPv4 range (ping or port-probe); requires cidr or start+end
    network_scan_tcp_ports     — TCP port scan on one host

  Raw probes:
    network_probe_tcp      — raw TCP connection with optional payload; banner grabbing
    network_check_tcp_port      — quick single TCP port open/closed check
    network_probe_udp      — raw UDP datagram probe (DNS, NTP, SNMP); requires a protocol-specific payload

  Domain context:
  - network_discover_hosts requires an explicit cidr or start+end; it does not infer the range from context.
  - network_probe_tcp handles banner grabbing for any TCP service with a known payload (SSH, FTP, HTTP raw).
  - network_probe_udp requires a protocol-specific payload for DNS, NTP, SNMP, etc.
  - network_get_arp_cache and network_reverse_dns provide MAC and hostname enrichment for discovered IPs.
  - TTL values from ping/traceroute indicate OS type: 64=Linux, 128=Windows, 255=network gear.
  - network_check_dns_propagation verifies DNS record rollout by querying 10 public resolvers.

  Output context:
  - Prefer structured, compact facts from the tools over raw verbose dumps.
  - Do not invent service versions, vendors, CVEs, or security conclusions when a tool did not observe them.
  - Use a specific skill procedure for multi-step audits, inventories, and final report formatting.

  Per-host KV memory (shared convention across all network skills):
  ► Host inventory scope: PROJECT. not session!

  Key layout — one key per host per concern, per port where multiple ports are possible:
    host:{ip}             — base record (always written first)
    host:{ip}:tcp         — any TCP scan or port probe results (all ports in one record)
    host:{ip}:tls:{port}  — TLS/SSL inspection results for a specific port (e.g. host:10.0.0.1:tls:443)
    host:{ip}:http:{port} — HTTP tool results for a specific port (e.g. host:10.0.0.1:http:80)
    host:{ip}:smtp:{port} — SMTP probe results for a specific port (e.g. host:10.0.0.1:smtp:25)
    host:{ip}:dns         — any DNS tool results

  Schemas:

  host:{ip}
      ip          — string, dotted decimal
      hostname    — string or null (PTR/DNS name)
      mac         — string or null (from ARP)
      vendor      — string or null (OUI vendor from MAC)
      class       — "active" | "icmp-only" | "tcp-only" | "dns-only" | "empty" | "gone"
      ping        — bool
      tags        — string[] (e.g. ["gateway", "vmware", "ssh"])
      scanned_at  — ISO-8601 timestamp

  host:{ip}:tcp
      ports       — [{port, protocol, banner, service, version}]
      scanned_at  — ISO-8601 timestamp

  host:{ip}:tls:{port}    (port is the integer port number, e.g. host:10.0.0.1:tls:443)
      subject     — string (CN)
      issuer      — string
      san         — string[] (Subject Alternative Names)
      valid_from  — ISO-8601
      valid_to    — ISO-8601
      protocol    — string (e.g. "TLS 1.3")
      cipher      — string
      chain_ok    — bool
      hsts        — string or null (Strict-Transport-Security value if checked via HTTP)
      scanned_at  — ISO-8601 timestamp

  host:{ip}:http:{port}   (port is the integer port number, e.g. host:10.0.0.1:http:80)
      status      — int (HTTP status code)
      server      — string or null (Server header)
      title       — string or null (page <title>)
      powered_by  — string or null (X-Powered-By header)
      location    — string or null (redirect target)
      headers     — object {name: value} (selected notable headers)
      scanned_at  — ISO-8601 timestamp

  host:{ip}:smtp:{port}   (port is the integer port number, e.g. host:10.0.0.1:smtp:25)
      banner      — string
      ehlo        — string (server EHLO name)
      starttls    — bool
      auth_methods — string[] (e.g. ["PLAIN", "LOGIN"])
      size_limit  — int or null (bytes)
      extensions  — string[]
      scanned_at  — ISO-8601 timestamp

  host:{ip}:dns
      hostname    — string or null (forward resolution result)
      ptr         — string or null (reverse PTR)
      a           — string[] (IPv4 addresses)
      aaaa        — string[] (IPv6 addresses)
      resolver    — string or null
      ttl         — int or null
      scanned_at  — ISO-8601 timestamp

  Operations:
  - Write: agent_memory_set {key:"host:172.16.21.1", value:{...}, scope:<host-inventory-scope>}
  - Read:  agent_memory_get {key:"host:172.16.21.1",  scope:<host-inventory-scope>}
  - List all hosts:       agent_memory_list {filter:"host:*", where:"class=active", scope:<host-inventory-scope>}
  - List all TLS records:  agent_memory_list {filter:"host:*:tls:*", scope:<host-inventory-scope>}
  - TLS for one host:     agent_memory_list {filter:"host:172.16.21.1:tls:*", scope:<host-inventory-scope>}
  - Filter by value:      agent_memory_list {filter:"host:*:http:*", where:"status=200", scope:<host-inventory-scope>}
  - All records one host: agent_memory_list {filter:"host:172.16.21.1*", scope:<host-inventory-scope>}

  Rules:
  - Any skill that discovers or enriches host data MUST write to host:{ip} (and sub-keys) using these schemas.
  - Always include scanned_at on every write. Merge — do not overwrite fields the current step did not touch.
  - <host-inventory-scope> refers to the scope declared in the ► line above.

  Rescan behaviour:
  - Default: always scan and overwrite. Existing records are updated, scanned_at is refreshed.
  - "find only new" / "skip known": read host:{ip} before scanning — skip IPs that already have a record.
  - "update older than N days": read host:{ip}, check scanned_at — skip IPs scanned within N days.
  - If a host no longer responds (no ping, no TCP, no ARP): set class="gone", ping=false, update scanned_at. Do not delete the record — gone is an observed fact.
  - Filter gone hosts: filter="host:*" where="class=gone"
  - Exclude gone hosts: filter="host:*" where="class=active"
