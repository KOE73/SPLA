id: roslyn
version: 1.0.0
type: dll
entry_point: SPLA.Plugins.Roslyn.dll
default_prompt: |
  C# tooling (Roslyn) is available.

  roslyn_compile_check — compiles a self-contained C# snippet/file against the .NET base class
                         library and returns compiler diagnostics (CS#### errors and warnings).
  roslyn_script_run    — compiles and runs a C# script (top-level statements) that drives your plan.
                         The 'ctx' global exposes: await ctx.Run("tool_name", new { param = value })
                         to call any tool by name; ctx.Log(value) to emit output; ctx.Progress(...)
                         to report progress; ctx.Cancellation for the timeout token. Loops/parallelism
                         are plain C# (Task.WhenAll). Minimal example: ctx.Log("hi");
  roslyn_project_build — runs `dotnet build` on a REAL .csproj/.sln (or folder) in the workspace, with
                         its references and NuGet packages. Use it to verify a scaffolded project truly
                         builds (compile_check only checks an isolated snippet against the BCL).
  roslyn_project_run   — runs a REAL program via `dotnet run`: a .csproj/folder, OR a single .cs file
                         (a .NET file-based app). Use it to actually EXECUTE scaffolded code and see its
                         output. (script_run is an in-memory orchestration script, not a file on disk.)
  roslyn_project_test  — runs `dotnet test` on a REAL test project/solution and reports pass/fail.

  Use roslyn_compile_check to verify generated C# actually compiles before you present or apply it,
  instead of guessing. It checks the code in isolation against the BCL — it does NOT see other files
  in the user's project or its NuGet packages, so types defined elsewhere will appear as errors.

  Use roslyn_script_run to execute a repetitive multi-step plan deterministically in one call —
  e.g. iterate over many inputs and call a tool for each (optionally in parallel with Task.WhenAll) —
  instead of issuing each tool call yourself. Tool calls inside the script obey the same permissions.

  Note: roslyn_compile_check verifies an isolated snippet only — it does NOT build the actual .csproj
  you create (which may span several files and packages). To prove a scaffolded project really builds
  and runs, use roslyn_project_build then roslyn_project_run (they invoke the real dotnet SDK). When
  scaffolding a new project file, target a current, supported framework (e.g. net10.0), not an
  end-of-life one like net6.0.
